<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#F5F5DC"/>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pattern)" opacity="0.1"/>
  <text x="50%" y="50%" font-family="Arial, sans-serif" font-size="24" fill="#333333" text-anchor="middle" dominant-baseline="middle" opacity="0.5">
    Artisan Workshop
  </text>
  <text x="50%" y="60%" font-family="Arial, sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="middle" opacity="0.3">
    1200 × 900
  </text>
  <defs>
    <pattern id="pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#333333" opacity="0.1"/>
    </pattern>
  </defs>
</svg>