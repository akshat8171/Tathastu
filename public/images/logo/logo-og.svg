<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e23"/>
      <stop offset="100%" style="stop-color:#0f1d16"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- TK Mark (centered, large) -->
  <g transform="translate(500, 60) scale(2.2)">
    <rect x="5" y="0" width="90" height="18" rx="2" fill="#FFFFFF"/>
    <rect x="33" y="0" width="16" height="78" rx="1" fill="#FFFFFF"/>
    <polygon points="49,35 49,50 82,18 95,0 85,0" fill="#FFFFFF"/>
    <polygon points="49,52 49,62 85,98 98,98 98,88" fill="#FFFFFF"/>
    <rect x="35" y="80" width="12" height="12" rx="3" fill="#a6b706"/>
  </g>

  <!-- Brand text -->
  <text x="600" y="380" font-family="Poppins, system-ui, sans-serif" font-weight="700" font-size="56" fill="white" text-anchor="middle">tathastu</text>
  <text x="600" y="430" font-family="Poppins, system-ui, sans-serif" font-weight="600" font-size="28" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="8">KEEPSAKES</text>

  <!-- Tagline -->
  <text x="600" y="490" font-family="Poppins, system-ui, sans-serif" font-size="18" fill="#a6b706" text-anchor="middle" letter-spacing="1.5">IF YOU CAN IMAGINE IT, WE CAN PRINT IT.</text>

  <!-- URL -->
  <text x="600" y="570" font-family="system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.4)" text-anchor="middle">www.tathastukeepsakes.in</text>
</svg>
