<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E7A66"/>
      <stop offset="100%" style="stop-color:#065F50"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- TK Mark (centered, scaled up) -->
  <g transform="translate(500, 80) scale(2.0)">
    <rect x="8" y="8" width="76" height="18" rx="3" fill="#FFFFFF"/>
    <rect x="8" y="8" width="18" height="84" rx="3" fill="#FFFFFF"/>
    <polygon points="26,38 26,28 84,8 84,26 38,42" fill="#FFFFFF"/>
    <polygon points="26,62 38,58 84,74 84,92 26,72" fill="#FFFFFF"/>
    <rect x="30" y="44" width="14" height="14" rx="4" fill="#c0e4dd"/>
  </g>

  <!-- Brand text -->
  <text x="600" y="380" font-family="Poppins, system-ui, sans-serif" font-weight="700" font-size="56" fill="white" text-anchor="middle">tathastu</text>
  <text x="600" y="430" font-family="Poppins, system-ui, sans-serif" font-weight="600" font-size="28" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="8">KEEPSAKES</text>

  <!-- Tagline -->
  <text x="600" y="490" font-family="Poppins, system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="2">IF YOU CAN IMAGINE IT, WE CAN PRINT IT.</text>

  <!-- URL -->
  <text x="600" y="570" font-family="system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle">www.tathastukeepsakes.in</text>
</svg>
