  <text x="600" y="385" font-family="Poppins, system-ui, sans-serif" font-weight="700" font-size="56" fill="white" text-anchor="middle">tathastu</text>
  <text x="600" y="435" font-family="Poppins, system-ui, sans-serif" font-weight="600" font-size="26" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="8">KEEPSAKES</text>

