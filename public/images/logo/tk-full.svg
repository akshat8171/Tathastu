<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <!-- TK Full Logo - Mark + Text - Tathastu Keepsakes -->

  <!-- TK Mark (scaled) -->
  <g transform="translate(10, 15) scale(0.5)">
    <rect x="8" y="8" width="76" height="18" rx="3" fill="#16182B"/>
    <rect x="8" y="8" width="18" height="84" rx="3" fill="#16182B"/>
    <polygon points="26,38 26,28 84,8 84,26 38,42" fill="#16182B"/>
    <polygon points="26,62 38,58 84,74 84,92 26,72" fill="#16182B"/>
    <rect x="30" y="44" width="14" height="14" rx="4" fill="#0E7A66"/>
  </g>

  <!-- Text: "tathastu" -->
  <text x="72" y="50" font-family="Poppins, system-ui, sans-serif" font-weight="700" font-size="28" fill="#16182B" letter-spacing="-0.5">tathastu</text>

  <!-- Text: "KEEPSAKES" -->
  <text x="72" y="76" font-family="Poppins, system-ui, sans-serif" font-weight="600" font-size="14" fill="#16182B" letter-spacing="4">KEEPSAKES</text>

  <!-- Tagline -->
  <text x="72" y="102" font-family="Poppins, system-ui, sans-serif" font-weight="400" font-size="8" fill="#0E7A66" letter-spacing="1">IF YOU CAN IMAGINE IT, WE CAN PRINT IT.</text>
</svg>
