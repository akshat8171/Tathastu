<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- TK Monogram - Tathastu Keepsakes -->
  <!-- Design: Bold T with crossbar, chunky K arms radiating from mid-stem -->
  <!-- Colors: ink #16182B + brand teal #0E7A66 accent -->

  <!-- T: horizontal crossbar at top -->
  <rect x="8" y="8" width="76" height="18" rx="3" fill="#16182B"/>

  <!-- T/K: thick vertical stem (full height) -->
  <rect x="8" y="8" width="18" height="84" rx="3" fill="#16182B"/>

  <!-- K: upper diagonal arm (chunky, from mid-stem to upper-right) -->
  <polygon points="26,38 26,28 84,8 84,26 38,42" fill="#16182B"/>

  <!-- K: lower diagonal arm (chunky, from mid-stem to lower-right) -->
  <polygon points="26,62 38,58 84,74 84,92 26,72" fill="#16182B"/>

  <!-- Accent: rounded square dot at K junction -->
  <rect x="30" y="44" width="14" height="14" rx="4" fill="#0E7A66"/>
</svg>
