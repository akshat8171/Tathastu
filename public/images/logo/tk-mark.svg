<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- TK Monogram - Tathastu Keepsakes -->
  <!-- Faithful recreation from original: T crossbar + center-left stem, K arms from junction -->
  <!-- Colors: #1a2e23 dark forest green, #a6b706 olive/chartreuse accent -->

  <!-- T: wide crossbar at top -->
  <rect x="5" y="0" width="90" height="18" rx="2" fill="#1a2e23"/>

  <!-- T: vertical stem (center-left, goes ~77% down) -->
  <rect x="33" y="0" width="16" height="78" rx="1" fill="#1a2e23"/>

  <!-- K: upper arm - diagonal wedge from junction up-right to crossbar -->
  <polygon points="49,40 49,50 82,18 95,0 85,0 49,35" fill="#1a2e23"/>

  <!-- K: lower arm - diagonal wedge from junction down-right -->
  <polygon points="49,52 49,62 85,98 98,98 98,88 49,55" fill="#1a2e23"/>

  <!-- Accent dot (olive/chartreuse rounded square at base of T stem) -->
  <rect x="35" y="80" width="12" height="12" rx="3" fill="#a6b706"/>
</svg>
