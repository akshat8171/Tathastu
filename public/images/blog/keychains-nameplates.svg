<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad5)"/>

  <!-- Decorative -->
  <circle cx="160" cy="130" r="100" fill="rgba(255,255,255,0.12)"/>
  <circle cx="1040" cy="500" r="110" fill="rgba(255,255,255,0.12)"/>

  <!-- Key icon -->
  <g transform="translate(600, 240)">
    <!-- Key head -->
    <circle cx="-50" cy="0" r="35" fill="rgba(255,255,255,0.95)" stroke="#1f2937" stroke-width="3"/>
    <circle cx="-50" cy="0" r="18" fill="none" stroke="#1f2937" stroke-width="3"/>
    <!-- Key shaft -->
    <rect x="-15" y="-10" width="80" height="20" rx="3" fill="rgba(255,255,255,0.95)" stroke="#1f2937" stroke-width="3"/>
    <!-- Key teeth -->
    <rect x="50" y="10" width="10" height="15" fill="rgba(255,255,255,0.95)" stroke="#1f2937" stroke-width="2"/>
    <rect x="35" y="10" width="10" height="20" fill="rgba(255,255,255,0.95)" stroke="#1f2937" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ffffff" text-anchor="middle">Custom Keychains &amp; Nameplates</text>
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.9)" text-anchor="middle">Design Your Own</text>

  <!-- Brand -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">Tathastu Keepsakes</text>
</svg>