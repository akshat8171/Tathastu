<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad12)"/>

  <!-- Decorative -->
  <circle cx="160" cy="130" r="100" fill="rgba(255,255,255,0.12)"/>
  <circle cx="1040" cy="500" r="110" fill="rgba(255,255,255,0.12)"/>

  <!-- Lab beaker and material layers icon -->
  <g transform="translate(600, 230)">
    <!-- Beaker -->
    <path d="M -40,-60 L -40,-40 L -50,40 Q -50,50 -40,55 L 40,55 Q 50,50 50,40 L 40,-40 L 40,-60 Z"
          fill="rgba(255,255,255,0.95)" stroke="#064e3b" stroke-width="3"/>
    <!-- Beaker rim -->
    <line x1="-45" y1="-60" x2="45" y2="-60" stroke="#064e3b" stroke-width="4"/>
    <!-- Material layers inside -->
    <rect x="-40" y="20" width="80" height="10" fill="#fbbf24" opacity="0.7"/>
    <rect x="-40" y="30" width="80" height="10" fill="#60a5fa" opacity="0.7"/>
    <rect x="-40" y="40" width="80" height="10" fill="#f87171" opacity="0.7"/>
    <!-- Measurement marks -->
    <line x1="-50" y1="10" x2="-45" y2="10" stroke="#064e3b" stroke-width="2"/>
    <line x1="-50" y1="25" x2="-45" y2="25" stroke="#064e3b" stroke-width="2"/>
    <line x1="-50" y1="40" x2="-45" y2="40" stroke="#064e3b" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#064e3b" text-anchor="middle">PLA vs ABS vs PETG</text>
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="36" fill="#065f46" text-anchor="middle">Which Material Is Right?</text>

  <!-- Brand -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="24" fill="#064e3b" text-anchor="middle">Tathastu Keepsakes</text>
</svg>