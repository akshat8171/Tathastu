<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad1)"/>

  <!-- Decorative pattern -->
  <circle cx="100" cy="100" r="150" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="530" r="180" fill="rgba(255,255,255,0.1)"/>

  <!-- Tools/Gear icon -->
  <g transform="translate(600, 220)">
    <!-- Wrench -->
    <path d="M -80,-40 L -60,-60 L -40,-40 L -50,-30 L -50,40 L -70,40 L -70,-30 Z" fill="rgba(255,255,255,0.9)" stroke="#1f2937" stroke-width="2"/>
    <!-- Gear -->
    <circle cx="40" cy="0" r="45" fill="rgba(255,255,255,0.9)" stroke="#1f2937" stroke-width="2"/>
    <circle cx="40" cy="0" r="25" fill="none" stroke="#1f2937" stroke-width="3"/>
    <rect x="35" y="-50" width="10" height="15" fill="rgba(255,255,255,0.9)"/>
    <rect x="35" y="35" width="10" height="15" fill="rgba(255,255,255,0.9)"/>
    <rect x="-10" y="-5" width="15" height="10" fill="rgba(255,255,255,0.9)"/>
    <rect x="85" y="-5" width="15" height="10" fill="rgba(255,255,255,0.9)"/>
  </g>

  <!-- Title text -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">Custom 3D Printing Service</text>
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.9)" text-anchor="middle">Get a Free Quote in 24 Hours</text>

  <!-- Brand name -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">Tathastu Keepsakes</text>
</svg>