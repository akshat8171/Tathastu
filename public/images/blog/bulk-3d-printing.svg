<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad7)"/>

  <!-- Decorative -->
  <circle cx="150" cy="130" r="100" fill="rgba(255,255,255,0.12)"/>
  <circle cx="1050" cy="500" r="120" fill="rgba(255,255,255,0.12)"/>

  <!-- Stack of boxes icon -->
  <g transform="translate(600, 230)">
    <!-- Back box -->
    <rect x="-40" y="-60" width="80" height="60" rx="3" fill="rgba(255,255,255,0.7)" stroke="#4c1d95" stroke-width="2"/>
    <!-- Middle box -->
    <rect x="-50" y="-20" width="80" height="60" rx="3" fill="rgba(255,255,255,0.85)" stroke="#4c1d95" stroke-width="2"/>
    <!-- Front box -->
    <rect x="-60" y="20" width="80" height="60" rx="3" fill="rgba(255,255,255,0.95)" stroke="#4c1d95" stroke-width="3"/>
    <!-- Box details on front -->
    <line x1="-60" y1="50" x2="20" y2="50" stroke="#4c1d95" stroke-width="2"/>
    <line x1="-20" y1="20" x2="-20" y2="80" stroke="#4c1d95" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#4c1d95" text-anchor="middle">Bulk 3D Printing Orders</text>
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="36" fill="#5b21b6" text-anchor="middle">For Businesses &amp; Events</text>

  <!-- Brand -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="#4c1d95" text-anchor="middle">Tathastu Keepsakes</text>
</svg>