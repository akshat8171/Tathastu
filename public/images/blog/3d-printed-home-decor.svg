<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdba74;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad4)"/>

  <!-- Decorative -->
  <circle cx="180" cy="140" r="110" fill="rgba(255,255,255,0.12)"/>
  <circle cx="1020" cy="490" r="120" fill="rgba(255,255,255,0.12)"/>

  <!-- Lamp icon -->
  <g transform="translate(600, 240)">
    <!-- Lamp shade -->
    <path d="M -70,-50 L 70,-50 L 50,30 L -50,30 Z" fill="rgba(255,255,255,0.95)" stroke="#1f2937" stroke-width="3"/>
    <!-- Stand -->
    <rect x="-10" y="30" width="20" height="60" fill="#1f2937"/>
    <!-- Base -->
    <ellipse cx="0" cy="90" rx="40" ry="10" fill="#1f2937"/>
    <!-- Light rays -->
    <path d="M -55,10 L -75,25" stroke="#fef3c7" stroke-width="4" stroke-linecap="round"/>
    <path d="M -35,15 L -50,30" stroke="#fef3c7" stroke-width="4" stroke-linecap="round"/>
    <path d="M 35,15 L 50,30" stroke="#fef3c7" stroke-width="4" stroke-linecap="round"/>
    <path d="M 55,10 L 75,25" stroke="#fef3c7" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">3D Printed Home Decor</text>
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.9)" text-anchor="middle">Lamps, Planters &amp; More</text>

  <!-- Brand -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">Tathastu Keepsakes</text>
</svg>