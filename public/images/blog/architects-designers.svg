<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad6)"/>

  <!-- Decorative -->
  <circle cx="170" cy="140" r="105" fill="rgba(255,255,255,0.12)"/>
  <circle cx="1030" cy="490" r="115" fill="rgba(255,255,255,0.12)"/>

  <!-- Building icon -->
  <g transform="translate(600, 230)">
    <!-- Building -->
    <rect x="-70" y="-50" width="140" height="140" rx="5" fill="rgba(255,255,255,0.95)" stroke="#1e3a8a" stroke-width="3"/>
    <!-- Windows -->
    <rect x="-55" y="-30" width="25" height="30" fill="#60a5fa"/>
    <rect x="-20" y="-30" width="25" height="30" fill="#60a5fa"/>
    <rect x="15" y="-30" width="25" height="30" fill="#60a5fa"/>
    <rect x="-55" y="10" width="25" height="30" fill="#60a5fa"/>
    <rect x="-20" y="10" width="25" height="30" fill="#60a5fa"/>
    <rect x="15" y="10" width="25" height="30" fill="#60a5fa"/>
    <rect x="-35" y="50" width="35" height="40" fill="#1e3a8a"/>
  </g>

  <!-- Title -->
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#1e3a8a" text-anchor="middle">3D Printing for Architects</text>
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="36" fill="#1e40af" text-anchor="middle">&amp; Interior Designers</text>

  <!-- Brand -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="24" fill="#1e3a8a" text-anchor="middle">Tathastu Keepsakes</text>
</svg>