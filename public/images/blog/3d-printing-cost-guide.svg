<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad3)"/>

  <!-- Decorative -->
  <circle cx="200" cy="120" r="100" fill="rgba(255,255,255,0.12)"/>
  <circle cx="1000" cy="500" r="130" fill="rgba(255,255,255,0.12)"/>

  <!-- Price tag icon -->
  <g transform="translate(600, 240)">
    <!-- Tag shape -->
    <path d="M -80,-60 L 60,-60 L 100,0 L 60,60 L -80,60 Z" fill="rgba(255,255,255,0.95)" stroke="#1f2937" stroke-width="3"/>
    <!-- Rupee symbol -->
    <text x="-20" y="25" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#1f2937">₹</text>
  </g>

  <!-- Title -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ffffff" text-anchor="middle">How Much Does 3D Printing Cost</text>
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.9)" text-anchor="middle">Complete Pricing Guide 2025</text>

  <!-- Brand -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">Tathastu Keepsakes</text>
</svg>