    <path d="M -60,-30 L -50,-50 L 50,-50 L 60,-30 L 50,40 L -50,40 Z" fill="rgba(255,255,255,0.95)" stroke="#78350f" stroke-width="3"/>
    <!-- Handles -->
    <path d="M -50,-20 Q -80,-20 -80,0 Q -80,15 -60,15" fill="none" stroke="#78350f" stroke-width="3"/>
    <path d="M 50,-20 Q 80,-20 80,0 Q 80,15 60,15" fill="none" stroke="#78350f" stroke-width="3"/>
    <!-- Base -->
    <rect x="-40" y="40" width="80" height="15" fill="rgba(255,255,255,0.95)" stroke="#78350f" stroke-width="2"/>
    <rect x="-50" y="55" width="100" height="10" rx="2" fill="#78350f"/>
    <!-- Star on cup -->
    <path d="M 0,-15 L 8,5 L 30,5 L 12,18 L 20,38 L 0,25 L -20,38 L -12,18 L -30,5 L -8,5 Z" fill="#fbbf24" stroke="#78350f" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#78350f" text-anchor="middle">Best 3D Printing Service in India</text>
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="36" fill="#92400e" text-anchor="middle">Why Choose Tathastu Keepsakes</text>

