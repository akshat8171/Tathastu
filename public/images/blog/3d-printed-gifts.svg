<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad2)"/>

  <!-- Decorative elements -->
  <circle cx="150" cy="150" r="120" fill="rgba(255,255,255,0.15)"/>
  <circle cx="1050" cy="480" r="140" fill="rgba(255,255,255,0.15)"/>

  <!-- Gift box icon -->
  <g transform="translate(600, 240)">
    <!-- Box -->
    <rect x="-80" y="-20" width="160" height="120" rx="5" fill="rgba(255,255,255,0.95)" stroke="#1f2937" stroke-width="3"/>
    <!-- Ribbon vertical -->
    <rect x="-15" y="-20" width="30" height="120" fill="#dc2626"/>
    <!-- Ribbon horizontal -->
    <rect x="-80" y="35" width="160" height="30" fill="#dc2626"/>
    <!-- Bow -->
    <ellipse cx="-30" cy="-40" rx="25" ry="15" fill="#dc2626"/>
    <ellipse cx="30" cy="-40" rx="25" ry="15" fill="#dc2626"/>
    <circle cx="0" cy="-40" r="12" fill="#dc2626"/>
    <path d="M -8,-50 L 0,-70 L 8,-50" fill="#dc2626"/>
  </g>

  <!-- Title -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">3D Printed Gifts</text>
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.9)" text-anchor="middle">Delivered Across India</text>

  <!-- Brand -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">Tathastu Keepsakes</text>
</svg>